name: KathReid TV Scheduler

on:
  schedule:
    - cron: "* * * * *"  # every minute
  workflow_dispatch: # allows manual run button

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run scheduler
        run: node cron/scheduler.js
