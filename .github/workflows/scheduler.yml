name: KathReid TV Scheduler

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scheduler
        run: node cron/scheduler.js
        env:
          DISCORD_WEBHOOK_KRBROADC: ${{ secrets.DISCORD_WEBHOOK_KRBROADC }}

      - name: Commit memory state
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/scheduler-memory.json
          git commit -m "update scheduler memory" || exit 0
          git push
