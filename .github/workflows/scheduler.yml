name: KathReid TV Scheduler

on:
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scheduler
        run: node cron/scheduler.js
        env:
          DISCORD_WEBHOOK_KRBROADC: ${{ secrets.DISCORD_WEBHOOK_KRBROADC }}
